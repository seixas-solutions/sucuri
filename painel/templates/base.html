<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sucuri — Despesas com Ensino Superior</title>
  <style>
    :root {
      --superficie: #fcfcfb; --tinta: #0b0b0b; --tinta2: #52514e;
      --muted: #898781; --grade: #e1e0d9; --azul: #2a78d6; --vermelho: #e34948;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
           background: var(--superficie); color: var(--tinta); }
    nav { display: flex; gap: 0.25rem; padding: 0.6rem 1.2rem; border-bottom: 1px solid var(--grade);
          align-items: baseline; flex-wrap: wrap; }
    nav .marca { font-weight: 700; margin-right: 1rem; }
    nav a { color: var(--tinta2); text-decoration: none; padding: 0.3rem 0.7rem; border-radius: 6px; }
    nav a:hover { background: var(--grade); }
    nav a.ativa { background: var(--azul); color: white; }
    main { max-width: 1080px; margin: 0 auto; padding: 1rem 1.2rem 3rem; }
    .aviso { background: #fdf6ec; border: 1px solid #eda100; border-radius: 8px;
             padding: 0.6rem 0.9rem; font-size: 0.82rem; color: var(--tinta2); margin: 0.8rem 0; }
    .cartoes { display: flex; gap: 0.8rem; flex-wrap: wrap; margin: 1rem 0; }
    .cartao { border: 1px solid var(--grade); border-radius: 8px; padding: 0.7rem 1rem; min-width: 150px; }
    .cartao .valor { font-size: 1.5rem; font-weight: 700; }
    .cartao .rotulo { font-size: 0.75rem; color: var(--muted); }
    figure { margin: 1.2rem 0; }
    figure img { max-width: 100%; border: 1px solid var(--grade); border-radius: 8px; }
    figcaption { font-size: 0.78rem; color: var(--muted); margin-top: 0.3rem; }
    .tabela-rolavel { overflow-x: auto; margin: 1rem 0; }
    table { border-collapse: collapse; font-size: 0.8rem; width: 100%; }
    th, td { border-bottom: 1px solid var(--grade); padding: 0.35rem 0.6rem; text-align: left; }
    th { color: var(--tinta2); background: #f5f4f0; position: sticky; top: 0; }
    td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
    tr.flag td { background: #fdeeee; }
    form.filtro { display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap; margin: 1rem 0; }
    select, input[type=number] { padding: 0.35rem; border: 1px solid var(--grade); border-radius: 6px;
                                 background: white; font-size: 0.85rem; max-width: 420px; }
    button { padding: 0.4rem 0.9rem; border: none; border-radius: 6px; background: var(--azul);
             color: white; cursor: pointer; }
    h1 { font-size: 1.3rem; } h2 { font-size: 1.05rem; margin-top: 1.6rem; }
    code { background: #f5f4f0; padding: 0.1rem 0.3rem; border-radius: 4px; font-size: 0.85em; }
  </style>
</head>
<body>
<nav>
  <span class="marca">🐍 Sucuri</span>
  {% for rota, titulo in [('visao_geral', 'Visão geral'), ('instituicoes', 'Instituições'),
                          ('anomalias', 'Anomalias'), ('contratos', 'Contratos'),
                          ('ibge', 'IBGE')] %}
    <a href="{{ url_for(rota) }}" class="{{ 'ativa' if request.endpoint == rota }}">{{ titulo }}</a>
  {% endfor %}
</nav>
<main>
  <div class="aviso">⚠️ {{ aviso }}</div>
  {% block conteudo %}{% endblock %}
</main>
</body>
</html>
